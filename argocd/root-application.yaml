apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-root
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-root
    app.kubernetes.io/part-of: spring-boot-api-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/Company-Engineering/spring-boot-api-gitops.git
    targetRevision: main
    path: argocd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
