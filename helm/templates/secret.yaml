{{- $secretName := printf "%s-secret" (include "spring-boot-api.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $appUsername := randAlphaNum 24 -}}
{{- $appPassword := randAlphaNum 40 -}}
{{- if and $existingSecret $existingSecret.data }}
  {{- if hasKey $existingSecret.data "APP_USERNAME" }}
    {{- $appUsername = (index $existingSecret.data "APP_USERNAME" | b64dec) -}}
  {{- end }}
  {{- if hasKey $existingSecret.data "APP_PASSWORD" }}
    {{- $appPassword = (index $existingSecret.data "APP_PASSWORD" | b64dec) -}}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "spring-boot-api.labels" . | nindent 4 }}
type: Opaque
data:
  APP_USERNAME: {{ $appUsername | b64enc | quote }}
  APP_PASSWORD: {{ $appPassword | b64enc | quote }}
